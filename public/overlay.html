<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100vw;height:100vh;background:rgba(0,0,0,0.35);cursor:crosshair;user-select:none;overflow:hidden}
#hint{position:fixed;top:16px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,0.82);color:#fff;padding:8px 20px;border-radius:8px;font:13px monospace;pointer-events:none;border:1px solid #555;white-space:nowrap;z-index:10}
#sel{position:fixed;display:none;border:2px solid #E84C1E;background:rgba(232,76,30,0.10);pointer-events:none;z-index:5}
#coords{position:fixed;background:rgba(0,0,0,0.85);color:#E84C1E;font:11px monospace;padding:3px 8px;border-radius:4px;pointer-events:none;display:none;z-index:10}
#cancel-btn{position:fixed;top:16px;right:16px;background:#E24B4A;color:#fff;border:none;border-radius:6px;padding:7px 16px;font:12px monospace;cursor:pointer;z-index:20}
#cancel-btn:hover{background:#c93a39}
</style>
</head>
<body>
<div id="hint">Cliquer + glisser pour selectionner une zone &nbsp;-&nbsp; Echap pour annuler</div>
<div id="sel"></div>
<div id="coords"></div>
<button id="cancel-btn">Annuler</button>
</body>
</html>
